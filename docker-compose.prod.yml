  # ── NestJS backend ─────────────────────────────────────────────────────────
  backend:
    # build:
    #   context: .
    #   dockerfile: backend/Dockerfile
    image: reg-aml.esoko.com/deveops-test.img/medibuddy-backend:alpha
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:      production
      POSTGRES_HOST: postgres
      REDIS_HOST:    redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs:/app/logs
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  web:
    # build:
    #   context: .
      # dockerfile: web/Dockerfile

    image: reg-aml.esoko.com/deveops-test.img/medibuddy-web:alpha
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  logs:

networks:
  internal:
    driver: bridge
